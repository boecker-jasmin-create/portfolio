<!doctype html>
<html lang="de">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Retail 300x250</title>
	<style>
		html, body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: Arial, sans-serif;
		}
		.banner {
			position: relative;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 12px;
			width: 100%;
			height: 100%;
			box-sizing: border-box;
			background: #ffebe7;
			color: #408266;
			text-align: center;
		}
		.cta {
			background: #408266;
			color: #fff;
			border-radius: 10px;
			padding: 8px 14px;
			font-size: 13px;
		}
	</style>
</head>
<body>
	<a class="banner" id="bannerLink" href="#" target="_blank" rel="noopener noreferrer" aria-label="Banner klicken">
		<strong>Frühlingsaktion</strong>
		<span>Neue Looks für die Saison</span>
		<span class="cta">Mehr erfahren</span>
	</a>
	<script>
		(function () {
			const params = new URLSearchParams(window.location.search);
			const clickTag = params.get('clickTag') || 'https://example.com';
			document.getElementById('bannerLink').href = clickTag;
		})();
	</script>
</body>
</html>
